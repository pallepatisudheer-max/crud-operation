<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Edit Student</h1>

    <form action="/update/{{ student.id }}" method="POST">

        <input
            type="text"
            name="name"
            value="{{ student.name }}"
            required>

        <input
            type="number"
            name="age"
            value="{{ student.age }}"
            required>

        <button type="submit">Update</button>

    </form>

</div>

</body>
</html>
</html>
